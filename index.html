<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Registration</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f1f5f9;
        }

        header {
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 20px;
        }

        header h1 {
            font-size: 28px;
        }

        nav {
            background-color: #1e293b;
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: #e2e8f0;
            margin: 0 15px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #60a5fa;
        }

        .hero {
            text-align: center;
        }

        .hero img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #0f172a;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input {
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
        }

        button {
            margin-top: 20px;
            background-color: #2563eb;
            color: #ffffff;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        footer {
            background-color: #0f172a;
            color: #cbd5e1;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>MICROSOFT</h1>
        <p>Registration Portal</p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a>
        <a href="#">Rules</a>
        <a href="#">About Us</a>
        <a href="#">Contact Us</a>
    </nav>

    <!-- Hero Image -->
    <div class="hero">
        <img src="https://tse4.mm.bing.net/th/id/OIP.qbsTDbB9qKP6pBQ0Rl9bpQHaEK?rs=1&pid=ImgDetMain&o=7&rm=3" alt="Office Image">
    </div>

    <!-- Form Section -->
    <div class="container">
        <h2>Register Yourself</h2>

        <form>
            <label for="name">Your Name</label>
            <input type="text" id="name" placeholder="Enter your name" required>

            <label for="phone">Contact No</label>
            <input type="tel" id="phone" placeholder="Enter your number" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>

            <label for="position">Position</label>
            <input type="text" id="position" placeholder="Enter position" required>

            <button type="submit">Submit Registration</button>
        </form>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 Microsoft Registration Portal | All rights reserved</p>
    </footer>

</body>
</html>
